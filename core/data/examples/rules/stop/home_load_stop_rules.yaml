rules:
  - name: "High Home Load Forecast"
    description: "Stop mining when total household forecast is high for the next 2 hours"
    conditions:
      all_of:
        - field: "home_load.total_forecast.next_2h.avg_power"
          operator: "gt"
          value: 2500  # Household expected to draw over 2.5 kW on average
        - field: "energy_state.battery.state_of_charge"
          operator: "lt"
          value: 70
    priority: 60
    enabled: true

  - name: "Boiler Peak + Low Battery"
    description: "Stop mining when boiler is forecasted to peak and battery is not high"
    conditions:
      all_of:
        - field: "home_load.devices.boiler.forecast.next_1h.peak_power"
          operator: "gt"
          value: 2000  # Boiler expected to draw over 2 kW peak in next hour
        - field: "energy_state.battery.state_of_charge"
          operator: "lt"
          value: 60
    priority: 55
    enabled: true

  - name: "Evening High Load History"
    description: "Stop mining during evening hours when recent consumption is high"
    conditions:
      all_of:
        - field: "timestamp.hour"
          operator: "in"
          value: [17, 18, 19, 20, 21, 22]
        - field: "home_load.total_history.last_1h.avg_power"
          operator: "gt"
          value: 2000  # Currently consuming over 2 kW average
        - field: "energy_state.battery.state_of_charge"
          operator: "lt"
          value: 75
    priority: 50
    enabled: true

  - name: "Multiple Devices High Forecast"
    description: "Stop mining when total forecast for next 4 hours shows sustained high load"
    conditions:
      all_of:
        - field: "home_load.total_forecast.next_4h.avg_power"
          operator: "gt"
          value: 1800
        - field: "home_load.total_forecast.next_4h.peak_power"
          operator: "gt"
          value: 3000  # Peak expected above 3 kW
        - any_of:
            - field: "energy_state.battery.state_of_charge"
              operator: "lt"
              value: 50
            - field: "energy_state.production"
              operator: "lt"
              value: 1000
    priority: 45
    enabled: true
